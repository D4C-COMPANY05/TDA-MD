<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyseur de Documents IA</title>
    <style>
        * {{ box-sizing: border-box; }}
        body {{
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a2e;
            color: #eee;
        }}
        h2 {{
            text-align: center;
            color: #e94560;
        }}
        .zone-upload {{
            background: #16213e;
            border: 2px dashed #e94560;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }}
        .statut {{
            background: #0f3460;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }}
        .statut.visible {{ display: block; }}
        #boite-chat {{
            background: #16213e;
            height: 350px;
            overflow-y: auto;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }}
        .message-user {{
            text-align: right;
            margin: 8px 0;
        }}
        .message-user span {{
            background: #e94560;
            color: white;
            padding: 8px 12px;
            border-radius: 15px;
            display: inline-block;
            max-width: 80%;
        }}
        .message-ia {{
            text-align: left;
            margin: 8px 0;
        }}
        .message-ia span {{
            background: #0f3460;
            color: #eee;
            padding: 8px 12px;
            border-radius: 15px;
            display: inline-block;
            max-width: 80%;
        }}
        #zone-input {{
            display: flex;
            gap: 10px;
        }}
        #input-question {{
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: none;
            background: #16213e;
            color: white;
            font-size: 16px;
        }}
        button {{
            padding: 10px 20px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
        }}
        input[type="file"] {{ display: none; }}
        label.btn-upload {{
            display: inline-block;
            padding: 10px 25px;
            background: #e94560;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
        }}
    </style>
</head>
<body>
    <h2>📄 Analyseur de Documents IA</h2>

    <div class="zone-upload">
        <p>Uploade un fichier PDF ou TXT</p>
        <label class="btn-upload" for="fichier-input">
            Choisir un fichier
        </label>
        <input type="file" id="fichier-input"
            accept=".pdf,.txt"
            onchange="uploadFichier()">
    </div>

    <div class="statut" id="statut"></div>

    <div id="boite-chat">
        <div class="message-ia">
            <span>Charge un document pour commencer à poser des questions.</span>
        </div>
    </div>

    <div id="zone-input">
        <input type="text" id="input-question"
            placeholder="Pose une question sur ton document...">
        <button onclick="poserQuestion()">Envoyer</button>
    </div>

    <script>
        async function uploadFichier() {
            const input = document.getElementById("fichier-input");
            const statut = document.getElementById("statut");
            const fichier = input.files[0];
            if (!fichier) return;

            const formData = new FormData();
            formData.append("fichier", fichier);

            statut.className = "statut visible";
            statut.textContent = "Chargement en cours...";

            const reponse = await fetch("/upload", {
                method: "POST",
                body: formData
            });

            const donnees = await reponse.json();

            if (donnees.erreur) {
                statut.textContent = "❌ " + donnees.erreur;
            } else {
                statut.textContent = "✅ " + donnees.message +
                    " (" + donnees.mots + " mots)" +
                    (donnees.tronque ? " — tronqué à 3000 mots" : "");

                document.getElementById("boite-chat").innerHTML = `
                    <div class="message-ia">
                        <span>Document chargé ! Pose-moi n'importe quelle question.</span>
                    </div>`;
            }
        }

        async function poserQuestion() {
            const input = document.getElementById("input-question");
            const boite = document.getElementById("boite-chat");
            const question = input.value.trim();
            if (!question) return;

            boite.innerHTML += `
                <div class="message-user">
                    <span>${question}</span>
                </div>`;
            input.value = "";

            boite.innerHTML += `
                <div class="message-ia" id="en-cours">
                    <span>⏳ Analyse en cours...</span>
                </div>`;
            boite.scrollTop = boite.scrollHeight;

            const reponse = await fetch("/question", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({question: question})
            });

            const donnees = await reponse.json();

            document.getElementById("en-cours").remove();

            boite.innerHTML += `
                <div class="message-ia">
                    <span>${donnees.erreur || donnees.reponse}</span>
                </div>`;
            boite.scrollTop = boite.scrollHeight;
        }

        document.getElementById("input-question")
            .addEventListener("keypress", function(e) {
                if (e.key === "Enter") poserQuestion();
            });
    </script>
</body>
</html>
